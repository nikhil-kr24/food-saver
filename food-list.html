<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Available Food – FoodSaver</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* Claimed food card overlay */
    .food-card.claimed { opacity: 0.72; }
    .food-card.claimed .food-card-header { background: var(--cream); }

    /* Phone link */
    .phone-link {
      color: var(--green-mid);
      font-weight: 600;
      text-decoration: none;
    }
    .phone-link:hover { text-decoration: underline; }

    /* Expiry warning */
    .expiry-warn { color: var(--danger) !important; font-weight: 600; }

    /* Claimed overlay badge */
    .claimed-overlay {
      text-align: center;
      padding: 8px;
      background: var(--amber-light);
      border-top: 1px solid rgba(244,162,97,0.3);
      font-size: 0.82rem;
      font-weight: 600;
      color: #b5541a;
    }

    .filter-count {
      font-size: 0.82rem;
      color: var(--text-light);
      margin-left: auto;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="main-nav"></nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-text">
    <h1 id="page-title">Available Food 🍛</h1>
    <p id="page-subtitle">Browse and claim food donations from generous donors near you.</p>
  </div>
  <div id="header-action"></div>
</div>

<!-- STATS -->
<div class="stats-row" id="stats-row"></div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input
    type="text"
    id="search-input"
    placeholder="🔍  Search by name, location..."
    oninput="renderFood()"
  />
  <select id="filter-type" onchange="renderFood()">
    <option value="">All Types</option>
    <option value="cooked">🍛 Cooked</option>
    <option value="raw">🥦 Raw / Vegetables</option>
    <option value="packaged">📦 Packaged</option>
    <option value="fruits">🍎 Fruits</option>
    <option value="baked">🍞 Baked</option>
    <option value="beverages">🥤 Beverages</option>
    <option value="other">🥡 Other</option>
  </select>
  <select id="filter-status" onchange="renderFood()">
    <option value="available">✅ Available Only</option>
    <option value="all">All Listings</option>
    <option value="claimed">🤝 Claimed</option>
  </select>
  <span class="filter-count" id="result-count"></span>
</div>

<!-- FOOD GRID -->
<div class="food-grid" id="food-grid"></div>

<script src="app.js"></script>
<script>
  let session;
  let isNgo = false;

  document.addEventListener('DOMContentLoaded', () => {
    session = FoodSaver.getSession();
    isNgo   = session?.role === 'ngo';

    // Non-logged-in visitors can browse in read-only mode
    if (!session) {
      document.getElementById('header-action').innerHTML =
        `<a href="login.html" class="btn btn-primary">Sign In to Claim →</a>`;
    } else if (isNgo) {
      document.getElementById('page-title').textContent    = 'Food Board 🍛';
      document.getElementById('page-subtitle').textContent = 'Claim available donations from donors near you.';
    }

    renderStats();
    renderFood();
    // Auto-refresh every 30s
    setInterval(() => { renderStats(); renderFood(); }, 30000);
  });

  function renderStats() {
    const stats = FoodSaver.getStats();
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card">
        <div class="stat-num">${stats.total}</div>
        <div class="stat-label">Total Listed</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${stats.available}</div>
        <div class="stat-label">Available Now</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${stats.claimed}</div>
        <div class="stat-label">Claimed</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${stats.donors}</div>
        <div class="stat-label">Active Donors</div>
      </div>
    `;
  }

  function renderFood() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const type   = document.getElementById('filter-type').value;
    const status = document.getElementById('filter-status').value;
    const grid   = document.getElementById('food-grid');

    let foods = FoodSaver.getFoods();

    // Filter by status
    if (status === 'available') foods = foods.filter(f => f.status === 'available');
    if (status === 'claimed')   foods = foods.filter(f => f.status === 'claimed');

    // Filter by type
    if (type) foods = foods.filter(f => f.type === type);

    // Search
    if (search) {
      foods = foods.filter(f =>
        f.name.toLowerCase().includes(search)     ||
        f.address.toLowerCase().includes(search)  ||
        f.donorName.toLowerCase().includes(search)||
        (f.notes && f.notes.toLowerCase().includes(search))
      );
    }

    document.getElementById('result-count').textContent = `${foods.length} result${foods.length !== 1 ? 's' : ''}`;

    if (!foods.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🫙</div>
          <h3>No food listings found</h3>
          <p>Try adjusting your filters, or check back soon.</p>
        </div>`;
      return;
    }

    grid.innerHTML = foods.map(f => buildFoodCard(f)).join('');
  }

  function buildFoodCard(f) {
    const isExpired  = new Date(f.expiry) < new Date();
    const expiresIn  = getExpiryLabel(f.expiry);
    const isClaimed  = f.status === 'claimed';
    const canClaim   = isNgo && !isClaimed && !isExpired;
    const canDelete  = session?.role === 'donor' && f.donorId === session?.id && !isClaimed;
    const canNgoDelete = isNgo;

    return `
      <div class="food-card ${isClaimed ? 'claimed' : ''}">
        <div class="food-card-header">
          <div class="food-card-icon">${getFoodEmoji(f.type)}</div>
          <div class="food-card-title">
            <h3>${f.name}</h3>
            <small>by ${f.donorName} · ${timeSince(f.createdAt)}</small>
          </div>
          <span class="badge ${isClaimed ? 'badge-amber' : isExpired ? 'badge-red' : 'badge-green'}">
            ${isClaimed ? '🤝 Claimed' : isExpired ? '⏰ Expired' : '✅ Available'}
          </span>
        </div>

        <div class="food-card-body">
          <div class="detail-row">
            <span class="icon">📦</span>
            <span>${f.quantity} · Serves ~${f.serves} people</span>
          </div>
          <div class="detail-row">
            <span class="icon">📍</span>
            <span>${f.address}</span>
          </div>
          <div class="detail-row">
            <span class="icon">📞</span>
            <a href="tel:${f.phone}" class="phone-link">${f.phone}</a>
          </div>
          <div class="detail-row">
            <span class="icon">⏰</span>
            <span class="${isExpired ? 'expiry-warn' : ''}">
              ${isExpired ? 'Expired: ' : 'Best before: '}
              ${formatDate(f.expiry)} at ${formatTime(f.expiry)}
              ${!isExpired ? `<em style="color:var(--text-light);font-size:0.8rem;"> (${expiresIn})</em>` : ''}
            </span>
          </div>
          ${f.notes ? `<div class="description">📝 ${f.notes}</div>` : ''}
        </div>

        <div class="food-card-footer">
          <span class="badge badge-green">${f.type}</span>
          <div style="display:flex;gap:8px;">
            ${canClaim
              ? `<button class="btn btn-primary btn-sm" onclick="claimFood('${f.id}')">🤝 Claim</button>`
              : ''
            }
            ${canDelete || canNgoDelete
              ? `<button class="btn btn-danger btn-sm" onclick="deleteFood('${f.id}')">🗑 Delete</button>`
              : ''
            }
            ${!session
              ? `<a href="login.html?role=ngo" class="btn btn-outline btn-sm">Sign in to claim</a>`
              : ''
            }
          </div>
        </div>

        ${isClaimed
          ? `<div class="claimed-overlay">🤝 Claimed by: ${f.claimedBy || 'NGO'} · ${f.claimedAt ? timeSince(f.claimedAt) : ''}</div>`
          : ''
        }
      </div>
    `;
  }

  function claimFood(id) {
    if (!session) { window.location.href = 'login.html?role=ngo'; return; }
    const ok = FoodSaver.claimFood(id);
    if (ok) {
      showToast('Food claimed! Contact the donor to arrange pickup.');
      renderStats();
      renderFood();
    } else {
      showToast('Unable to claim this item.', 'error');
    }
  }

  function deleteFood(id) {
    showConfirm(
      'Remove Listing',
      'Are you sure you want to delete this food listing?',
      () => {
        FoodSaver.deleteFood(id);
        showToast('Listing removed.');
        renderStats();
        renderFood();
      }
    );
  }

  function getExpiryLabel(iso) {
    const ms  = new Date(iso) - Date.now();
    const hrs = Math.floor(ms / 3600000);
    const min = Math.floor((ms % 3600000) / 60000);
    if (ms <= 0) return 'Expired';
    if (hrs < 1) return `${min}m left`;
    if (hrs < 24) return `${hrs}h ${min}m left`;
    return `${Math.floor(hrs/24)}d left`;
  }
</script>
</body>
</html>
